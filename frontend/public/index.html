<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <meta name="theme-color" content="#10b981" />
        <meta name="description" content="Audix Stock Management - Enterprise Stock Count Application for Android Scanners" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="Audix" />
        
        <!-- Android Chrome specific -->
        <meta name="format-detection" content="telephone=no" />
        <meta name="HandheldFriendly" content="true" />
        
        <!-- PWA Manifest -->
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        
        <!-- App Icons -->
        <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/icons/icon-192x192.png" />
        <link rel="icon" type="image/png" sizes="512x512" href="%PUBLIC_URL%/icons/icon-512x512.png" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />
        <link rel="shortcut icon" href="%PUBLIC_URL%/icons/icon-96x96.png" />
        
        <!-- Splash Screen Colors -->
        <meta name="msapplication-TileColor" content="#10b981" />
        <meta name="msapplication-TileImage" content="%PUBLIC_URL%/icons/icon-144x144.png" />
        
        <title>Audix Stock Management</title>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        
        <!-- Service Worker Registration for OFFLINE Support -->
        <script>
            // Register service worker immediately for offline support
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    navigator.serviceWorker.register('/service-worker.js')
                        .then(function(registration) {
                            console.log('[Audix] Service Worker registered for OFFLINE support');
                            
                            // Check for updates
                            registration.addEventListener('updatefound', function() {
                                const newWorker = registration.installing;
                                newWorker.addEventListener('statechange', function() {
                                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                        // New version available - activate immediately
                                        newWorker.postMessage({ type: 'SKIP_WAITING' });
                                    }
                                });
                            });
                            
                            // Pre-cache all app pages
                            if (registration.active) {
                                registration.active.postMessage({ type: 'CACHE_ALL' });
                            }
                        })
                        .catch(function(error) {
                            console.error('[Audix] Service Worker registration failed:', error);
                        });
                    
                    // Refresh when new service worker takes over
                    navigator.serviceWorker.addEventListener('controllerchange', function() {
                        console.log('[Audix] New service worker activated');
                    });
                });
            }
            
            // Notify user about offline/online status
            window.addEventListener('online', function() {
                console.log('[Audix] App is ONLINE');
            });
            
            window.addEventListener('offline', function() {
                console.log('[Audix] App is OFFLINE - continuing with cached data');
            });
        </script>
    </body>
</html>
