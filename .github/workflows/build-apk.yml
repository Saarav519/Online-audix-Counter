name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          npm install -g yarn
          yarn install --ignore-engines

      - name: Build web app
        working-directory: ./frontend
        env:
          CI: false
          DISABLE_ESLINT_PLUGIN: true
        run: yarn build

      - name: Sync Capacitor
        working-directory: ./frontend
        run: npx cap sync android

      - name: Create local.properties
        working-directory: ./frontend/android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Verify Gradle Wrapper JAR exists
        working-directory: ./frontend/android
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Gradle wrapper JAR missing, downloading..."
            mkdir -p gradle/wrapper
            curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.0.2/gradle/wrapper/gradle-wrapper.jar
          fi
          ls -la gradle/wrapper/gradle-wrapper.jar

      - name: Make Gradle executable
        working-directory: ./frontend/android
        run: chmod +x ./gradlew

      - name: Build Debug APK
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Find and collect APK
        run: |
          echo "=== Searching for ALL APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== Checking expected path ==="
          ls -la frontend/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Expected debug APK directory NOT found"
          echo "=== Collecting APK to artifact folder ==="
          mkdir -p apk-output
          find frontend/android -name "*.apk" -type f -exec cp {} apk-output/ \;
          echo "=== Files in apk-output ==="
          ls -la apk-output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Audix-APK
          path: apk-output/
          retention-days: 90
          if-no-files-found: error
