name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: yarn install

      - name: Build web app
        working-directory: ./frontend
        run: |
          CI=false yarn build

      - name: Check build output
        working-directory: ./frontend
        run: |
          echo "Checking build folder..."
          ls -la build/ || echo "Build folder not found"

      - name: Sync Capacitor
        working-directory: ./frontend
        run: |
          npx cap sync android

      - name: Create local.properties
        working-directory: ./frontend/android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties

      - name: Check Android project structure
        working-directory: ./frontend/android
        run: |
          echo "=== Android project structure ==="
          ls -la
          echo "=== App folder ==="
          ls -la app/
          echo "=== Gradle wrapper ==="
          ls -la gradle/wrapper/

      - name: Make Gradle executable
        working-directory: ./frontend/android
        run: chmod +x ./gradlew

      - name: Clean Gradle
        working-directory: ./frontend/android
        run: ./gradlew clean --no-daemon || true

      - name: Build Debug APK
        working-directory: ./frontend/android
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: List APK output
        run: |
          echo "=== APK Output ==="
          find frontend/android -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Audix-APK
          path: frontend/android/app/build/outputs/apk/debug/*.apk
          retention-days: 90
          if-no-files-found: error
