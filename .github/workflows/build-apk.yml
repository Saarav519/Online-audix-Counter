name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: yarn install

      - name: Build web app
        working-directory: ./frontend
        run: yarn build

      - name: Install Capacitor CLI
        working-directory: ./frontend
        run: yarn add @capacitor/cli @capacitor/core @capacitor/android

      - name: Sync Capacitor
        working-directory: ./frontend
        run: npx cap sync android

      - name: Create local.properties
        working-directory: ./frontend/android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make Gradle executable
        working-directory: ./frontend/android
        run: chmod +x ./gradlew

      - name: Build Debug APK
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv frontend/android/app/build/outputs/apk/debug/app-debug.apk frontend/android/app/build/outputs/apk/debug/Audix-v1.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Audix-APK
          path: frontend/android/app/build/outputs/apk/debug/Audix-v1.0.apk
          retention-days: 90
