name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          npm install -g yarn
          yarn install --ignore-engines

      - name: Build web app
        working-directory: ./frontend
        env:
          CI: false
          DISABLE_ESLINT_PLUGIN: true
        run: yarn build

      - name: Sync Capacitor
        working-directory: ./frontend
        run: npx cap sync android

      - name: Create local.properties
        working-directory: ./frontend/android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Verify Gradle Wrapper JAR exists
        working-directory: ./frontend/android
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Gradle wrapper JAR missing, downloading..."
            mkdir -p gradle/wrapper
            curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.0.2/gradle/wrapper/gradle-wrapper.jar
          fi
          ls -la gradle/wrapper/gradle-wrapper.jar

      - name: Make Gradle executable
        working-directory: ./frontend/android
        run: chmod +x ./gradlew

      - name: Build Debug APK
        working-directory: ./frontend/android
        run: |
          echo "=== Starting Gradle assembleDebug ==="
          ./gradlew assembleDebug --no-daemon --stacktrace
          echo "=== Gradle build completed ==="

      - name: Verify APK generated
        run: |
          echo "=== Searching for APK files ==="
          find frontend/android -name "*.apk" -type f
          echo "=== APK search complete ==="

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Audix-APK
          path: frontend/android/**/*.apk
          retention-days: 90
          if-no-files-found: error
