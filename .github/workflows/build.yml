name: Build Audix App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build React app
        working-directory: frontend
        run: yarn build
        env:
          CI: false  # Prevents treating warnings as errors
          GENERATE_SOURCEMAP: false

      - name: Upload Web Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: audix-web-build
          path: frontend/build
          retention-days: 30

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-web  # Run after web build succeeds
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build React app
        working-directory: frontend
        run: yarn build
        env:
          CI: false
          GENERATE_SOURCEMAP: false

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Download Gradle Wrapper JAR
        working-directory: frontend/android
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.0.2/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x ./gradlew

      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Find APK files
        run: |
          echo "=== Searching for all APK files ==="
          find frontend/android -name "*.apk" -type f 2>/dev/null
          echo "=== Done ==="

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: audix-android-debug-apk
          path: frontend/android/**/*.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        working-directory: frontend/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Find Release APK files
        run: |
          echo "=== Searching for all APK files ==="
          find frontend/android -name "*.apk" -type f 2>/dev/null
          echo "=== Done ==="

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: audix-android-release-apk
          path: frontend/android/**/*.apk
          retention-days: 30
